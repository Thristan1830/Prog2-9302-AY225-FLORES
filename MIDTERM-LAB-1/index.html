<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Analytics | Dataset Processor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Product Performance Overview</h1>
            <label for="csv-upload" class="custom-button">Import CSV Data</label>
            <input type="file" id="csv-upload" accept=".csv" hidden>
        </header>

        <section class="dashboard">
            <div class="stats-row">
                <div class="card">
                    <span class="card-title">PERFORMANCE THRESHOLD (AVG)</span>
                    <span id="avg-threshold" class="card-value">$0.00</span>
                </div>
                <div class="card">
                    <span class="card-title">TOTAL UNIQUE PRODUCTS</span>
                    <span id="product-count" class="card-value">0</span>
                </div>
            </div>

            <div class="output-container">
                <pre id="output-area">Upload a CSV file to begin analysis...</pre>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
